<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kraken Futures P&L Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

  :root {
    --bg: #0d0d0f;
    --bg2: #141418;
    --bg3: #1c1c22;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --purple: #7c5cfc;
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #555568;
    --green: #4ade80;
    --red: #f87171;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  .header {
    width: 100%;
    max-width: 700px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--purple);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .header-text h1 { font-size: 15px; font-weight: 500; }
  .header-text p { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

  .card {
    width: 100%;
    max-width: 700px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  /* Type toggle */
  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .type-btn {
    flex: 1;
    padding: 8px;
    font-size: 13px;
    font-family: var(--mono);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .type-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
  }

  /* Direction toggle */
  .dir-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 0;
  }
  .dir-btn {
    flex: 1;
    padding: 8px;
    font-size: 13px;
    font-family: var(--mono);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .dir-btn.long.active { background: rgba(74,222,128,0.15); border-color: var(--green); color: var(--green); }
  .dir-btn.short.active { background: rgba(248,113,113,0.15); border-color: var(--red); color: var(--red); }

  /* Form grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .grid.full { grid-template-columns: 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-wrap input:focus { border-color: var(--purple); }
  .input-wrap .unit {
    position: absolute;
    right: 10px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    pointer-events: none;
  }
  .input-wrap input.has-unit { padding-right: 36px; }

  /* Fees row */
  .fees-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* Result card */
  .result-card {
    width: 100%;
    max-width: 700px;
    border-radius: 12px;
    padding: 24px;
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    margin-bottom: 16px;
  }

  .result-main {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .result-label { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .result-amount { font-size: 36px; font-weight: 500; font-family: var(--mono); transition: color 0.2s; }
  .result-pct { font-size: 14px; font-family: var(--mono); }
  .result-amount.profit, .result-pct.profit { color: var(--green); }
  .result-amount.loss, .result-pct.loss { color: var(--red); }
  .result-amount.neutral, .result-pct.neutral { color: var(--text2); }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 4px;
  }
  .badge.profit { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge.loss { background: rgba(248,113,113,0.15); color: var(--red); }

  .breakdown {
    margin-top: 16px;
    border-top: 0.5px solid var(--border);
    padding-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 24px;
  }
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; }
  .breakdown-key { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .breakdown-val { font-size: 12px; font-family: var(--mono); color: var(--text2); }
  .breakdown-val.pos { color: var(--green); }
  .breakdown-val.neg { color: var(--red); }

  .result-top-row{display:flex;align-items:center;gap:24px}
  .pnl-block{flex:1}
  .kraken-side{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
  .kraken-caption{font-size:11px;font-family:var(--mono);margin-top:2px}
  .kraken-caption.profit{color:#4ade80}
  .kraken-caption.loss{color:#f87171}
  .disclaimer {
    width: 100%;
    max-width: 700px;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    text-align: center;
    padding-top: 8px;
  }

  /* Reset button */
  .reset-btn {
    width: 100%;
    max-width: 700px;
    padding: 10px;
    font-size: 13px;
    font-family: var(--mono);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    margin-bottom: 12px;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--border2); color: var(--text2); }

  @media (max-width: 520px) {
    .grid, .fees-row { grid-template-columns: 1fr; }
    .breakdown { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  </div>
  <div class="header-text">
    <h1>Futures P&L Calculator</h1>
    <p>kraken futures · illustrative purposes only</p>
  </div>
</div>

<!-- Contract type + direction -->
<div class="card">
  <div class="card-title">Contract Type</div>
  <div class="type-toggle" style="margin-bottom:20px">
    <button class="type-btn active" id="btn-linear" onclick="setType('linear')">Linear (USD Settled)</button>
    <button class="type-btn" id="btn-inverse" onclick="setType('inverse')">Inverse (Coin Settled)</button>
  </div>
  <div id="coin-selector" style="display:none;margin-bottom:20px">
    <div class="card-title" style="margin-bottom:10px">Settlement Coin</div>
    <div class="type-toggle">
      <button class="type-btn active" id="btn-btc" onclick="setCoin('BTC')">BTC</button>
      <button class="type-btn" id="btn-eth" onclick="setCoin('ETH')">ETH</button>
      <button class="type-btn" id="btn-xrp" onclick="setCoin('XRP')">XRP</button>
      <button class="type-btn" id="btn-ltc" onclick="setCoin('LTC')">LTC</button>
    </div>
  </div>
  <div class="card-title">Direction</div>
  <div class="dir-toggle">
    <button class="dir-btn long active" id="btn-long" onclick="setDir('long')">Long</button>
    <button class="dir-btn short" id="btn-short" onclick="setDir('short')">Short</button>
  </div>
</div>

<!-- Prices + size -->
<div class="card">
  <div class="card-title">Trade Details</div>
  <div class="grid">
    <div class="field">
      <label>Entry Price (USD)</label>
      <div class="input-wrap">
        <input type="number" id="entry" placeholder="0.00" min="0" step="any" oninput="calc()"/>
        <span class="unit">$</span>
      </div>
    </div>
    <div class="field">
      <label>Exit Price (USD)</label>
      <div class="input-wrap">
        <input type="number" id="exit" placeholder="0.00" min="0" step="any" oninput="calc()"/>
        <span class="unit">$</span>
      </div>
    </div>
    <div class="field">
      <label id="size-label">Position Size (Contracts)</label>
      <div class="input-wrap">
        <input type="number" id="size" placeholder="1" min="0" step="any" oninput="calc()"/>
      </div>
    </div>
    <div class="field">
      <label>Leverage</label>
      <div class="input-wrap">
        <input type="number" id="leverage" value="10" min="1" max="100" step="1" oninput="calc()"/>
        <span class="unit">x</span>
      </div>
    </div>
  </div>
</div>

<!-- Fees -->
<div class="card">
  <div class="card-title">Fees</div>
  <div class="fees-row">
    <div class="field">
      <label>Opening Fee (%)</label>
      <div class="input-wrap">
        <input type="number" id="fee-open" value="0.05" min="0" max="0.5" step="0.001" oninput="calc()" class="has-unit"/>
        <span class="unit">%</span>
      </div>
    </div>
    <div class="field">
      <label>Closing Fee (%)</label>
      <div class="input-wrap">
        <input type="number" id="fee-close" value="0.05" min="0" max="0.5" step="0.001" oninput="calc()" class="has-unit"/>
        <span class="unit">%</span>
      </div>
    </div>
  </div>
</div>

<!-- Result -->
<div class="result-card" id="result-card">
  <div class="result-top-row">
    <div class="pnl-block">
      <div class="result-label">Estimated P&L</div>
      <div class="result-main">
        <div class="result-amount neutral" id="result-amount">—</div>
        <div class="result-pct neutral" id="result-pct"></div>
        <span class="badge" id="result-badge" style="display:none"></span>
      </div>
    </div>
    <div class="kraken-side" id="kraken-side" style="display:none">
      <div id="kraken-img"></div>
      <div class="kraken-caption" id="kraken-caption"></div>
    </div>
  </div>
  <div class="breakdown" id="breakdown" style="display:none">
    <div class="breakdown-row"><span class="breakdown-key">Entry Value</span><span class="breakdown-val" id="b-entry-val">—</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Exit Value</span><span class="breakdown-val" id="b-exit-val">—</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Gross P&L</span><span class="breakdown-val" id="b-gross">—</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Total Fees</span><span class="breakdown-val neg" id="b-fees">—</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Net P&L</span><span class="breakdown-val" id="b-net">—</span></div>
    <div class="breakdown-row"><span class="breakdown-key">ROI</span><span class="breakdown-val" id="b-roi">—</span></div>
  </div>
</div>

<button class="reset-btn" onclick="reset()">↺ Reset</button>

<script>
let contractType = 'linear';
let direction = 'long';
let settlementCoin = 'BTC';

function setCoin(c) {
  settlementCoin = c;
  ['BTC','ETH','XRP','LTC'].forEach(x => document.getElementById('btn-'+x.toLowerCase()).classList.toggle('active', x === c));
  calc();
}

function setType(t) {
  contractType = t;
  document.getElementById('btn-linear').classList.toggle('active', t === 'linear');
  document.getElementById('btn-inverse').classList.toggle('active', t === 'inverse');
  document.getElementById('size-label').textContent = t === 'linear' ? 'Position Size (Contracts)' : '# of Contracts';
  document.getElementById('coin-selector').style.display = t === 'inverse' ? 'block' : 'none';
  calc();
}

function setDir(d) {
  direction = d;
  document.getElementById('btn-long').classList.toggle('active', d === 'long');
  document.getElementById('btn-short').classList.toggle('active', d === 'short');
  calc();
}

function fmt(n, decimals = 2) {
  return n.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function calc() {
  const entry = parseFloat(document.getElementById('entry').value);
  const exit  = parseFloat(document.getElementById('exit').value);
  const size  = parseFloat(document.getElementById('size').value);
  const lev   = parseFloat(document.getElementById('leverage').value) || 1;
  const feeOpen  = parseFloat(document.getElementById('fee-open').value) || 0;
  const feeClose = parseFloat(document.getElementById('fee-close').value) || 0;

  if (!entry || !exit || !size) {
    setNeutral();
    return;
  }

  // Direction sign
  const sign = direction === 'long' ? 1 : -1;
  const signedSize = size * sign;

  let grossPnl, entryValue, exitValue, fees;

  if (contractType === 'linear') {
    grossPnl   = (exit - entry) * signedSize;
    entryValue = entry * size;
    exitValue  = exit * size;
  } else {
    // Inverse: PnL stays in settlement coin
    // PnL (coin) = [(1/entry) - (1/exit)] * signedContracts
    grossPnl   = ((1 / entry) - (1 / exit)) * signedSize;
    entryValue = size / entry; // contracts / entry price = coin value
    exitValue  = size / exit;
  }

  // Fees
  if (contractType === 'linear') {
    fees = (entryValue * feeOpen / 100) + (exitValue * feeClose / 100);
  } else {
    // Inverse fees in coin: notional in coin * fee rate
    fees = (entryValue * feeOpen / 100) + (exitValue * feeClose / 100);
  }

  const netPnl = grossPnl - fees;
  const margin = contractType === 'linear' ? (entryValue / lev) : (entryValue / lev);
  const roi = margin > 0 ? (netPnl / margin) * 100 : 0;

  // Update UI
  const isProfit = netPnl >= 0;
  const cls = netPnl === 0 ? 'neutral' : isProfit ? 'profit' : 'loss';
  const currency = contractType === 'linear' ? 'USD' : settlementCoin;

  const mainDec = contractType === 'linear' ? 2 : 6;
  document.getElementById('result-amount').textContent = (isProfit ? '+' : '') + fmt(netPnl, mainDec) + ' ' + currency;
  const krakenSide = document.getElementById('kraken-side');
  const krakenImg = document.getElementById('kraken-img');
  const krakenCap = document.getElementById('kraken-caption');
  if (netPnl !== 0) {
    krakenSide.style.display = 'flex';
    krakenImg.innerHTML = isProfit ? KRAKEN_PROFIT : KRAKEN_LOSS;
    krakenCap.textContent = isProfit ? 'wen lambo ser' : 'have you tried getting a job';
    krakenCap.className = 'kraken-caption ' + (isProfit ? 'profit' : 'loss');
  } else { krakenSide.style.display = 'none'; }
  document.getElementById('result-amount').className = 'result-amount ' + cls;

  document.getElementById('result-pct').textContent = (isProfit ? '+' : '') + fmt(roi, 3) + '%';
  document.getElementById('result-pct').className = 'result-pct ' + cls;

  const badge = document.getElementById('result-badge');
  badge.style.display = 'inline-block';
  badge.textContent = isProfit ? 'Profit' : 'Loss';
  badge.className = 'badge ' + (isProfit ? 'profit' : 'loss');

  document.getElementById('breakdown').style.display = 'grid';

  if (contractType === 'linear') {
    document.getElementById('b-entry-val').textContent = '$' + fmt(entryValue);
    document.getElementById('b-exit-val').textContent  = '$' + fmt(exitValue);
  } else {
    document.getElementById('b-entry-val').textContent = fmt(entryValue, 6) + ' ' + settlementCoin;
    document.getElementById('b-exit-val').textContent  = fmt(exitValue, 6) + ' ' + settlementCoin;
  }

  const grossCls = grossPnl >= 0 ? 'pos' : 'neg';
  const netCls   = netPnl >= 0 ? 'pos' : 'neg';
  const sym = contractType === 'linear' ? '$' : '';
  const sfx = contractType === 'linear' ? '' : ' ' + settlementCoin;
  const dec = contractType === 'linear' ? 2 : 6;
  document.getElementById('b-gross').textContent = (grossPnl >= 0 ? '+' : '') + sym + fmt(grossPnl, dec) + sfx;
  document.getElementById('b-gross').className = 'breakdown-val ' + grossCls;
  document.getElementById('b-fees').textContent  = '-' + sym + fmt(fees, dec) + sfx;
  document.getElementById('b-net').textContent   = (netPnl >= 0 ? '+' : '') + sym + fmt(netPnl, dec) + sfx;
  document.getElementById('b-net').className = 'breakdown-val ' + netCls;
  document.getElementById('b-roi').textContent   = (roi >= 0 ? '+' : '') + fmt(roi, 3) + '%';
  document.getElementById('b-roi').className = 'breakdown-val ' + (roi >= 0 ? 'pos' : 'neg');
}

function setNeutral() {
  document.getElementById('result-amount').textContent = '—';
  document.getElementById('kraken-side').style.display = 'none';
  document.getElementById('result-amount').className = 'result-amount neutral';
  document.getElementById('result-pct').textContent = '';
  document.getElementById('result-badge').style.display = 'none';
  document.getElementById('breakdown').style.display = 'none';
}

function reset() {
  ['entry','exit','size'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('leverage').value = '10';
  document.getElementById('fee-open').value = '0.05';
  document.getElementById('fee-close').value = '0.05';
  setType('linear');
  setDir('long');
  setCoin('BTC');
  setNeutral();
}
</script>
